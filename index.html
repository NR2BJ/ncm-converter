            }
            
            // Add Vorbis comment block (type 4)
            result[writePos] = picture ? 4 : 0x84; // Type 4, last if no picture
            result[writePos + 1] = (vorbis.length >> 16) & 0xff;
            result[writePos + 2] = (vorbis.length >> 8) & 0xff;
            result[writePos + 3] = vorbis.length & 0xff;
            writePos += 4;
            result.set(vorbis, writePos); writePos += vorbis.length;
            
            // Add picture block if present
            if (picture) {
                result[writePos] = 0x86; // Type 6 + last block flag
                result[writePos + 1] = (picture.length >> 16) & 0xff;
                result[writePos + 2] = (picture.length >> 8) & 0xff;
                result[writePos + 3] = picture.length & 0xff;
                writePos += 4;
                result.set(picture, writePos); writePos += picture.length;
            }
            
            // Copy audio frames
            result.set(audioData.slice(pos), writePos);
            
            return result.slice(0, writePos + audioData.length - pos);
        }

        // ID3v2 for MP3
        function createId3v2Tag(imageData, mimeType, title, artist, album) {
            const encoder = new TextEncoder();
            const frames = [];
            
            // Helper to create text frame
            function textFrame(id, text) {
                const textBytes = encoder.encode(text);
                const frame = new Uint8Array(10 + 1 + textBytes.length);
                frame.set(encoder.encode(id), 0);
                const size = 1 + textBytes.length;
                frame[4] = (size >> 24) & 0x7f; frame[5] = (size >> 16) & 0x7f;
                frame[6] = (size >> 8) & 0x7f; frame[7] = size & 0x7f;
                frame[8] = 0; frame[9] = 0; // Flags
                frame[10] = 3; // UTF-8 encoding
                frame.set(textBytes, 11);
                return frame;
            }
            
            // Add text frames
            if (title) frames.push(textFrame('TIT2', title));
            if (artist) frames.push(textFrame('TPE1', artist));
            if (album) frames.push(textFrame('TALB', album));
            
            // APIC frame (album art)
            if (imageData && imageData.length > 0) {
                const mimeBytes = encoder.encode(mimeType);
                const apicSize = 1 + mimeBytes.length + 1 + 1 + 1 + imageData.length;
                const apic = new Uint8Array(10 + apicSize);
                apic.set(encoder.encode('APIC'), 0);
                apic[4] = (apicSize >> 24) & 0x7f; apic[5] = (apicSize >> 16) & 0x7f;
                apic[6] = (apicSize >> 8) & 0x7f; apic[7] = apicSize & 0x7f;
                apic[8] = 0; apic[9] = 0;
                let pos = 10;
                apic[pos++] = 0; // Encoding: ISO-8859-1
                apic.set(mimeBytes, pos); pos += mimeBytes.length;
                apic[pos++] = 0; // Null terminator
                apic[pos++] = 3; // Picture type: front cover
                apic[pos++] = 0; // Description (empty)
                apic.set(imageData, pos);
                frames.push(apic);
            }
            
            // Calculate total size
            let totalSize = 0;
            for (const frame of frames) totalSize += frame.length;
            
            // Create ID3v2 header
            const header = new Uint8Array(10);
            header.set(encoder.encode('ID3'), 0);
            header[3] = 4; header[4] = 0; // Version 2.4.0
            header[5] = 0; // Flags
            // Syncsafe integer
            header[6] = (totalSize >> 21) & 0x7f;
            header[7] = (totalSize >> 14) & 0x7f;
            header[8] = (totalSize >> 7) & 0x7f;
            header[9] = totalSize & 0x7f;
            
            // Combine
            const tag = new Uint8Array(10 + totalSize);
            tag.set(header, 0);
            let offset = 10;
            for (const frame of frames) { tag.set(frame, offset); offset += frame.length; }
            
            return tag;
        }

        function embedMp3Tags(audioData, imageData, mimeType, title, artist, album) {
            const tag = createId3v2Tag(imageData, mimeType, title, artist, album);
            
            // Check if already has ID3v2
            let audioStart = 0;
            if (String.fromCharCode(...audioData.slice(0, 3)) === 'ID3') {
                // Skip existing ID3v2 tag
                const size = ((audioData[6] & 0x7f) << 21) | ((audioData[7] & 0x7f) << 14) |
                             ((audioData[8] & 0x7f) << 7) | (audioData[9] & 0x7f);
                audioStart = 10 + size;
            }
            
            const result = new Uint8Array(tag.length + audioData.length - audioStart);
            result.set(tag, 0);
            result.set(audioData.slice(audioStart), tag.length);
            return result;
        }

        async function decryptNCM(arrayBuffer) {
            const data = new Uint8Array(arrayBuffer);
            let offset = 0;
            
            if (String.fromCharCode(...data.slice(0, 8)) !== 'CTENFDAM') throw new Error('Invalid NCM file');
            offset = 10;
            
            const keyLen = data[offset] | (data[offset+1] << 8) | (data[offset+2] << 16) | (data[offset+3] << 24);
            offset += 4;
            const keyData = new Uint8Array(data.slice(offset, offset + keyLen));
            offset += keyLen;
            for (let i = 0; i < keyData.length; i++) keyData[i] ^= 0x64;
            
            const aes1 = new AES(CORE_KEY);
            const decryptedKey = unpad(aes1.decrypt(keyData)).slice(17);
            
            const box = new Uint8Array(256);
            for (let i = 0; i < 256; i++) box[i] = i;
            let j = 0;
            for (let i = 0; i < 256; i++) { j = (j + box[i] + decryptedKey[i % decryptedKey.length]) & 0xff; [box[i], box[j]] = [box[j], box[i]]; }
            
            const keyStream = new Uint8Array(256);
            for (let i = 0; i < 256; i++) {
                const key1 = (i + 1) & 0xff, key2 = (key1 + box[key1]) & 0xff;
                keyStream[i] = box[(box[key1] + box[key2]) & 0xff];
            }
            
            const metaLen = data[offset] | (data[offset+1] << 8) | (data[offset+2] << 16) | (data[offset+3] << 24);
            offset += 4;
            
            let metadata = { format: 'mp3', musicName: 'Unknown', artist: [], album: 'Unknown', musicId: 0 };
            if (metaLen > 0) {
                const metaData = new Uint8Array(data.slice(offset, offset + metaLen));
                offset += metaLen;
                for (let i = 0; i < metaData.length; i++) metaData[i] ^= 0x63;
                const metaStr = new TextDecoder().decode(metaData).slice(22);
                const decoded = atob(metaStr);
                const decodedBytes = new Uint8Array(decoded.length);
                for (let i = 0; i < decoded.length; i++) decodedBytes[i] = decoded.charCodeAt(i);
                const aes2 = new AES(META_KEY);
                const decryptedMeta = unpad(aes2.decrypt(decodedBytes));
                metadata = JSON.parse(new TextDecoder().decode(decryptedMeta).slice(6));
            }
            
            offset += 5; // Skip CRC
            
            const imageSpace = data[offset] | (data[offset+1] << 8) | (data[offset+2] << 16) | (data[offset+3] << 24);
            offset += 4;
            const imageLen = data[offset] | (data[offset+1] << 8) | (data[offset+2] << 16) | (data[offset+3] << 24);
            offset += 4;
            const imageData = imageLen > 0 ? data.slice(offset, offset + imageLen) : null;
            offset += imageSpace;
            
            const audioData = new Uint8Array(data.slice(offset));
            for (let i = 0; i < audioData.length; i++) audioData[i] ^= keyStream[i & 0xff];
            
            let artist = 'Unknown';
            if (metadata.artist && metadata.artist.length > 0) {
                artist = Array.isArray(metadata.artist[0]) ? metadata.artist.map(a => a[0]).join(', ') : metadata.artist.join(', ');
            }
            
            return {
                audio: audioData,
                format: metadata.format || 'mp3',
                title: metadata.musicName || 'Unknown',
                artist, album: metadata.album || 'Unknown',
                musicId: metadata.musicId,
                embeddedImage: imageData
            };
        }

        async function fetchAlbumArt(musicId) {
            if (!musicId) return null;
            
            try {
                const response = await fetch(`https://ncmproxy.richard00726.workers.dev/proxy/api/song/detail/?ids=[${musicId}]`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.songs && data.songs[0]) {
                        return data.songs[0].album.picUrl;
                    }
                }
            } catch (e) { 
                console.log('Album art API failed:', e);
            }
            return null;
        }

        async function fetchImageAsBytes(url) {
            if (!url) return null;
            
            try {
                const urlObj = new URL(url);
                let proxyUrl;
                if (urlObj.hostname.includes('126.net')) {
                    proxyUrl = `https://ncmproxy.richard00726.workers.dev/img${urlObj.pathname}`;
                } else {
                    proxyUrl = `https://ncmproxy.richard00726.workers.dev/proxy${urlObj.pathname}`;
                }
                
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    const blob = await response.blob();
                    if (blob.size > 1000) {
                        return new Uint8Array(await blob.arrayBuffer());
                    }
                }
            } catch (e) { 
                console.log('Image fetch failed:', e);
            }
            return null;
        }

        // UI
        let files = {};
        let currentFileId = null;
        
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const downloadAllBtn = document.getElementById('download-all-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusEl = document.getElementById('status');
        const audioPlayer = document.getElementById('audio-player');
        const playerCover = document.getElementById('player-cover');
        const playerCoverPlaceholder = document.getElementById('player-cover-placeholder');
        const playerTitle = document.getElementById('player-title');
        const playerArtist = document.getElementById('player-artist');
        const playerPlayBtn = document.getElementById('player-play-btn');
        const playerProgress = document.getElementById('player-progress');
        const playerProgressFill = document.getElementById('player-progress-fill');
        const playerCurrent = document.getElementById('player-current');
        const playerDuration = document.getElementById('player-duration');
        const volumeSlider = document.getElementById('volume-slider');
        
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); fileInput.value = ''; });
        
        async function handleFiles(fileList) {
            const ncmFiles = Array.from(fileList).filter(f => f.name.toLowerCase().endsWith('.ncm'));
            if (ncmFiles.length === 0) { showStatus('Please select NCM files only', 'error'); return; }
            
            // Process 10 files at a time to limit memory usage
            const BATCH_SIZE = 10;
            for (let i = 0; i < ncmFiles.length; i += BATCH_SIZE) {
                const batch = ncmFiles.slice(i, i + BATCH_SIZE);
                await Promise.all(batch.map(file => processFile(file)));
            }
        }
        
        async function processFile(file) {
            const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            addLoadingItem(fileId, file.name);
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const result = await decryptNCM(arrayBuffer);
                
                // Get album art from API only (high quality)
                let coverData = null;
                let coverUrl = null;
                let mimeType = 'image/jpeg';
                
                if (result.musicId) {
                    const apiCoverUrl = await fetchAlbumArt(result.musicId);
                    if (apiCoverUrl) {
                        coverData = await fetchImageAsBytes(apiCoverUrl);
                        coverUrl = apiCoverUrl;
                    }
                }
                
                // Detect image type
                if (coverData && coverData.length > 2) {
                    if (coverData[0] === 0x89 && coverData[1] === 0x50) mimeType = 'image/png';
                    else if (coverData[0] === 0xff && coverData[1] === 0xd8) mimeType = 'image/jpeg';
                }
                
                // Embed tags
                let finalAudio = result.audio;
                if (result.format === 'flac') {
                    finalAudio = embedFlacTags(result.audio, coverData, mimeType, result.title, result.artist, result.album);
                } else {
                    finalAudio = embedMp3Tags(result.audio, coverData, mimeType, result.title, result.artist, result.album);
                }
                
                const audioMime = result.format === 'flac' ? 'audio/flac' : 'audio/mpeg';
                const blob = new Blob([finalAudio], { type: audioMime });
                const audioUrl = URL.createObjectURL(blob);
                
                files[fileId] = {
                    ...result,
                    audio: finalAudio,
                    audioUrl,
                    coverUrl,
                    filename: `${result.title} - ${result.artist}.${result.format}`
                };
                
                removeItem(fileId);
                addFileItem(fileId, files[fileId]);
                updateButtons();
            } catch (err) {
                removeItem(fileId);
                showStatus(`Failed: ${file.name} - ${err.message}`, 'error');
            }
        }
        
        function addLoadingItem(id, name) {
            removeEmptyState();
            const item = document.createElement('div');
            item.className = 'file-item loading'; item.id = id;
            item.innerHTML = `<div class="spinner"></div><div class="file-info"><div class="file-title">${escapeHtml(name)}</div><div class="file-artist">Converting...</div></div>`;
            fileList.appendChild(item);
        }
        
        function addFileItem(id, file) {
            removeEmptyState();
            const item = document.createElement('div');
            item.className = 'file-item'; item.id = id;
            item.innerHTML = `
                ${file.coverUrl ? `<img class="file-cover" src="${file.coverUrl}" alt="Cover">` : '<div class="file-cover"></div>'}
                <div class="file-info">
                    <div class="file-title">${escapeHtml(file.title)}</div>
                    <div class="file-artist">${escapeHtml(file.artist)}</div>
                    <div class="file-album">${escapeHtml(file.album)}</div>
                </div>
                <span class="file-format">${file.format.toUpperCase()}</span>
                <div class="file-actions">
                    <button class="file-btn play-btn" data-id="${id}" title="Play"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                    <button class="file-btn download-btn" data-id="${id}" title="Download"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></button>
                    <button class="file-btn delete-btn" data-id="${id}" title="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
                </div>`;
            fileList.appendChild(item);
            item.querySelector('.play-btn').addEventListener('click', () => togglePlay(id));
            item.querySelector('.download-btn').addEventListener('click', () => downloadFile(id));
            item.querySelector('.delete-btn').addEventListener('click', () => deleteFile(id));
        }
        
        function removeItem(id) { const item = document.getElementById(id); if (item) item.remove(); checkEmptyState(); }
        function removeEmptyState() { const empty = fileList.querySelector('.empty-state'); if (empty) empty.remove(); }
        function checkEmptyState() { if (Object.keys(files).length === 0 && !fileList.querySelector('.loading')) fileList.innerHTML = '<div class="empty-state">No files converted yet</div>'; }
        function updateButtons() { const hasFiles = Object.keys(files).length > 0; downloadAllBtn.disabled = !hasFiles; clearBtn.disabled = !hasFiles; }
        
        function togglePlay(fileId) { if (currentFileId === fileId && !audioPlayer.paused) audioPlayer.pause(); else playTrack(fileId); }
        
        function playTrack(fileId) {
            const file = files[fileId];
            if (!file) return;
            if (file.coverUrl) { playerCover.src = file.coverUrl; playerCover.style.display = 'block'; playerCoverPlaceholder.style.display = 'none'; }
            else { playerCover.style.display = 'none'; playerCoverPlaceholder.style.display = 'block'; }
            playerTitle.textContent = file.title; playerArtist.textContent = file.artist; playerPlayBtn.disabled = false;
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('playing'));
            document.getElementById(fileId)?.classList.add('playing');
            document.querySelectorAll('.play-btn').forEach(btn => { btn.classList.remove('playing'); btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`; });
            currentFileId = fileId;
            audioPlayer.src = file.audioUrl;
            audioPlayer.play();
        }
        
        audioPlayer.addEventListener('play', () => {
            playerPlayBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
            if (currentFileId) { const btn = document.querySelector(`[data-id="${currentFileId}"].play-btn`); if (btn) { btn.classList.add('playing'); btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`; } }
        });
        audioPlayer.addEventListener('pause', () => {
            playerPlayBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
            if (currentFileId) { const btn = document.querySelector(`[data-id="${currentFileId}"].play-btn`); if (btn) { btn.classList.remove('playing'); btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`; } }
        });
        audioPlayer.addEventListener('ended', () => { document.querySelectorAll('.file-item').forEach(el => el.classList.remove('playing')); playerPlayBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`; playerProgressFill.style.width = '0%'; });
        audioPlayer.addEventListener('timeupdate', () => { if (audioPlayer.duration) { playerProgressFill.style.width = `${(audioPlayer.currentTime / audioPlayer.duration) * 100}%`; playerCurrent.textContent = formatTime(audioPlayer.currentTime); } });
        audioPlayer.addEventListener('loadedmetadata', () => { playerDuration.textContent = formatTime(audioPlayer.duration); });
        playerPlayBtn.addEventListener('click', () => { if (!currentFileId) return; if (audioPlayer.paused) audioPlayer.play(); else audioPlayer.pause(); });
        playerProgress.addEventListener('click', (e) => { if (!audioPlayer.duration) return; const rect = playerProgress.getBoundingClientRect(); audioPlayer.currentTime = ((e.clientX - rect.left) / rect.width) * audioPlayer.duration; });
        volumeSlider.addEventListener('input', (e) => { audioPlayer.volume = e.target.value; });
        
        function formatTime(seconds) { if (!seconds || isNaN(seconds)) return '0:00'; return `${Math.floor(seconds / 60)}:${Math.floor(seconds % 60).toString().padStart(2, '0')}`; }
        
        function downloadFile(fileId) {
            const file = files[fileId]; if (!file) return;
            const a = document.createElement('a'); a.href = file.audioUrl; a.download = file.filename; a.click();
        }
        
        downloadAllBtn.addEventListener('click', async () => {
            if (Object.keys(files).length === 0) return;
            downloadAllBtn.disabled = true; downloadAllBtn.textContent = 'Creating ZIP...';
            try {
                const zip = new JSZip();
                for (const [id, file] of Object.entries(files)) zip.file(file.filename, file.audio);
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'ncm_converted.zip'; a.click();
                URL.revokeObjectURL(url);
            } catch (err) { showStatus('Failed to create ZIP', 'error'); }
            downloadAllBtn.disabled = false;
            downloadAllBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Download All (ZIP)`;
        });
        
        function deleteFile(fileId) {
            if (currentFileId === fileId) { audioPlayer.pause(); audioPlayer.src = ''; currentFileId = null; resetPlayer(); }
            const file = files[fileId];
            if (file) { if (file.audioUrl) URL.revokeObjectURL(file.audioUrl); if (file.coverUrl && file.coverUrl.startsWith('blob:')) URL.revokeObjectURL(file.coverUrl); }
            delete files[fileId]; removeItem(fileId); updateButtons();
        }
        
        clearBtn.addEventListener('click', () => {
            audioPlayer.pause(); audioPlayer.src = ''; currentFileId = null;
            for (const file of Object.values(files)) { if (file.audioUrl) URL.revokeObjectURL(file.audioUrl); if (file.coverUrl && file.coverUrl.startsWith('blob:')) URL.revokeObjectURL(file.coverUrl); }
            files = {}; fileList.innerHTML = '<div class="empty-state">No files converted yet</div>'; updateButtons(); resetPlayer();
        });
        
        function resetPlayer() {
            playerTitle.textContent = 'No track selected'; playerArtist.textContent = '-';
            playerCover.style.display = 'none'; playerCoverPlaceholder.style.display = 'block';
            playerPlayBtn.disabled = true; playerProgressFill.style.width = '0%';
            playerCurrent.textContent = '0:00'; playerDuration.textContent = '0:00';
        }
        
        function showStatus(message, type) { statusEl.textContent = message; statusEl.className = `status ${type}`; setTimeout(() => { statusEl.className = 'status'; }, 5000); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    </script>
</body>
